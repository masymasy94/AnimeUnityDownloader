name: Build, Push and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  COMPOSE_FILE: /home/masy/Desktop/docker/homeserver/docker-compose.yml

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-firetv-apk:
    if: contains(github.event.head_commit.message, 'RELEASE')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build APK
        working-directory: firetv
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: |
          APK_PATH=$(find firetv/app/build/outputs/apk -name "*.apk" | head -1)
          cp "$APK_PATH" firetv/AnimeHub-TV.apk

      - name: Update latest release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Release
          body: |
            Auto-generated from `${{ github.sha }}`.

            **Fire TV**: scarica `AnimeHub-TV.apk` e installa con Downloader o `adb install`.
          files: firetv/AnimeHub-TV.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    needs: build-and-push
    if: contains(github.event.head_commit.message, 'RELEASE')
    runs-on: [self-hosted, homeserver]
    permissions:
      packages: read

    steps:
      - name: Log in to Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull new image
        run: docker compose -f ${{ env.COMPOSE_FILE }} pull animehub

      - name: Recreate container
        run: docker compose -f ${{ env.COMPOSE_FILE }} up -d animehub

      - name: Wait for health check
        run: |
          echo "Waiting for container to become healthy..."
          for i in $(seq 1 20); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' animehub 2>/dev/null || echo "starting")
            echo "  Attempt $i/20: $STATUS"
            if [ "$STATUS" = "healthy" ]; then
              echo "Container is healthy!"
              exit 0
            fi
            sleep 5
          done
          echo "WARNING: Container did not become healthy within 100s"
          docker logs --tail 20 animehub
          exit 1
