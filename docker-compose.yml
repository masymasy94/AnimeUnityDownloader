services:
  animehub:
    build: .
    container_name: animehub
    ports:
      - "${PORT:-8010}:8000"
    volumes:
      - animehub-data:/data
      - ${DOWNLOAD_PATH:-${HOME}/Downloads/Anime}:/downloads
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////data/animehub.db
      - DOWNLOAD_DIR=/downloads
      - HOST_DOWNLOAD_PATH=${DOWNLOAD_PATH:-${HOME}/Downloads/Anime}
      - MAX_CONCURRENT_DOWNLOADS=${MAX_CONCURRENT_DOWNLOADS:-2}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - STATIC_DIR=/app/static
    restart: unless-stopped

volumes:
  animehub-data:
